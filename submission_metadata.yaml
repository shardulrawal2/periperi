ai_usage_summary: |
  Used Claude via opencode CLI for architectural guidance, code review, and debugging.
  No candidate data was fed to any external LLM. The ranker runs entirely locally.

methodology_summary: |
  Two-stage candidate ranker for Senior AI Engineer role at Redrob AI.
  Stage 1 (tight filter): Hard consistency checks screen 100K->~1,700 candidates
  by checking impossible skill-month ratios, non-AI titles with excessive skills,
  and AI/ML-relevance via career-history title analysis (not keyword matching).
  Stage 2 (semantic scoring): ONNX-quantized MiniLM (all-MiniLM-L6-v2) embeds
  candidate career history text and scores across 6 JD-derived semantic facets:
  production retrieval/ranking, embeddings/vector search, LLM/fine-tuning,
  production ML, search/recommendation, and senior product-AI experience.
  Facet scores fused via Reciprocal Rank Fusion (k=60, selected by grid search).
  Recruitability applied as multiplicative gate (0.3-1.0), not additive term.
  Honeypot detection uses impossibility checks only (role-tenure vs career length,
  skill-month vs experience, expert-zero skills). Total runtime ~45s on CPU.
  Pre-computation: run python download_model.py once to cache the ONNX model.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  reproduction_tested: true
