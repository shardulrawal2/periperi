ai_usage_summary: |
  Used Claude via opencode CLI for architectural guidance, code review, and debugging.
  No candidate data was fed to any external LLM. The ranker runs entirely locally.

methodology_summary: |
  Two-stage candidate ranker for Senior AI Engineer role at Redrob AI.
  Stage 1 (tight filter): Hard consistency checks screen 100K->~1,800 candidates
  by checking impossible skill-month ratios, non-AI titles with excessive skills,
  and AI/ML-relevance via career-history title analysis. Experience is a loose
  gate (2-20yrs); fine-grained fit is a soft factor in Stage 2 so strong senior
  or borderline candidates aren't dropped early.
  Stage 2 (semantic scoring): ONNX MiniLM (all-MiniLM-L6-v2) embeds each candidate
  as several segments (summary/headline + most recent roles, recency weighted)
  and scores them against 6 JD-derived semantic facets: production retrieval/
  ranking, embeddings/vector search, LLM/fine-tuning, production ML, search/
  recommendation, and senior product-AI experience. Per-facet scores are max-pooled
  over segments, then fused via a JD-weighted sum of the raw cosine similarities
  (magnitudes preserved). Final score is adjusted by soft experience fit, an
  aspirational-language penalty, a recruitability re-rank (0.7-1.0 multiplier so
  reachability breaks ties within a fit band rather than overriding fit), and a
  small verified-signal bonus (skill-assessment scores, education tier, GitHub).
  Honeypot detection uses impossibility checks only (skill-month vs experience,
  expert-zero skills, non-AI titles with many skills). Total runtime ~3min on CPU.
  Pre-computation: run python download_model.py once to cache the ONNX model.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  reproduction_tested: true
